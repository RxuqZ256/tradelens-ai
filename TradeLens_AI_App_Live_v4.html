<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>TradeLens AI Live v4</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617}
    #app{display:block;width:100%;height:100dvh;border:0;background:#020617}
  </style>
</head>
<body>
  <iframe id="app" title="TradeLens AI" src="TradeLens_AI_App.html?text_renderer=20260618ai"></iframe>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="tradelens-live-combined-v1.js?v=20260618ai"></script>
  <script>
  (function(){
    var frame=document.getElementById('app');
    function injectBriefingScripts(){
      try{
        var doc=frame.contentDocument||frame.contentWindow.document;
        if(!doc||!doc.head){setTimeout(injectBriefingScripts,500);return;}

        if(!doc.getElementById('tl-native-briefing-script')){
          var nativeScript=doc.createElement('script');
          nativeScript.id='tl-native-briefing-script';
          nativeScript.src='tradelens-briefing-native.js?v=20260618ai';
          doc.head.appendChild(nativeScript);
        }

        if(!doc.getElementById('tl-briefing-live-bind-script')){
          var bindScript=doc.createElement('script');
          bindScript.id='tl-briefing-live-bind-script';
          bindScript.src='tradelens-briefing-live-bind.js?v=20260618ai';
          doc.head.appendChild(bindScript);
        }
      }catch(error){
        setTimeout(injectBriefingScripts,500);
      }
    }
    frame.addEventListener('load',function(){setTimeout(injectBriefingScripts,50);});
    setTimeout(injectBriefingScripts,400);
  })();
  </script>
</body>
</html>
